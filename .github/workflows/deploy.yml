name: Deploy React Website to cPanel via SSH

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    env:
      VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
      VITE_EMAILJS_ADMIN_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_ADMIN_TEMPLATE_ID }}
      VITE_EMAILJS_USER_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_USER_TEMPLATE_ID }}
      VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build

      - name: Deploy dist folder to cPanel public_html
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.CPANEL_SSH_HOST }}
          REMOTE_USER: ${{ secrets.CPANEL_SSH_USER }}
          REMOTE_PORT: ${{ secrets.CPANEL_SSH_PORT }}
          SOURCE: "dist/"
          TARGET: "/home/precio74/public_html/"
          ARGS: "-rlgoDzvc --delete"